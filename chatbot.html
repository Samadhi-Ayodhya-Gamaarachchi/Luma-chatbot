<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <title>Luma 🤖</title>
    <link rel="stylesheet" href="chatbot.css">
</head>

<body>

    <div class="chat-app">

        <div class="chat-header">
            <div class="avatar">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="8" r="4" fill="#7F77DD"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#7F77DD" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="header-text">
                <h2>Luma AI</h2>
                <p>llama3.2:3b &middot; running locally</p>
            </div>
            <div class="status-dot" title="Local / Offline"></div>
        </div>

        <div id="chat-window">
            <div class="welcome">
                <div class="icon">&#x1F916;</div>
                <strong>Luma is running fully offline</strong>
                Ask me anything — I'm powered by your local Ollama instance.
            </div>
        </div>

        <div class="input-area">
            <textarea id="user-input" rows="1" placeholder="Type a message..."></textarea>
            <button id="send-btn" onclick="askAI()" title="Send">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

    </div>

    <script src="chatbot.js"></script>

</body>
</html>
