<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <title>Luma 🤖</title>
    <link rel="stylesheet" href="chatbot.css">
</head>

<body>

    <div class="chat-app">

        <div class="chat-header">
            <div class="avatar">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="8" r="4" fill="#7F77DD"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#7F77DD" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="header-text">
                <h2>Luma AI</h2>
                <p> running locally</p>
            </div>
            <div class="status-dot" title="Local / Offline"></div>
        </div>

        <div id="chat-window">
            <div class="welcome">
                <div class="icon">&#x1F916;</div>
                <strong>Luma is running fully offline</strong>
                Ask me anything — I'm powered by your local Ollama instance.
            </div>
        </div>

        <div id="preview-container" style="padding: 0 20px;"></div>

        <div class="input-area">
            <input type="file" id="image-input" accept="image/*" style="display:none;">
            
            <button type="button" onclick="document.getElementById('image-input').click()" class="icon-btn">📷</button>
            
            <textarea id="user-input" placeholder="Ask about the image..."></textarea>
            <button onclick="askAI()" class="send-btn">Send</button>
        </div>
        <div id="preview-container"></div>

    </div>

    <script src="chatbot.js"></script>
    <script src="chat-logic.js"></script>

</body>
</html>
